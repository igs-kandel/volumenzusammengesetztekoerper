<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const btn=document.getElementById("fillBtn");
const btn2=document.getElementById("btn2");
const btn3=document.getElementById("btn3");
const btnNew=document.getElementById("btnNew");
const task2SplitBtn=document.getElementById("task2SplitBtn");
const task2CompleteBtn=document.getElementById("task2CompleteBtn");

let rx=0.28, ry=0.62, scale=108;
let draggingModel=false, draggingCube=null, lastX=0, lastY=0, activePointerId=null;
let cubesVisible=false;
let splitMode=false;
let completeMode=false;
let splitAnimStart=0;
let completeAnimStart=0;
let currentTask=1;
let task2SplitMode=false;
let task2CompleteMode=false;
let task2AnimStart=0;
let taskQuestionMode=null;
let taskQuestionStage=0;
let animationRunning=false;
let showCompleteButton=false;
let showSplitButton=false;
let showComplementBlock=false;
let onPopupClose=null;
let calcPopupShown=false;
let calcOptionsUnlocked=false;
function showPopup(message, color, actionText=null, actionCallback=null){
  const box=document.getElementById("popupBox");
  const txt=document.getElementById("popupText");
  const action=document.getElementById("popupActionBtn");
  if(!box || !txt) return;
  txt.textContent=message;
  box.style.color=color;
  box.style.borderColor=color;
  box.style.display="block";

  if(action){
    if(actionText && actionCallback){
      action.textContent=actionText;
      action.style.background=color;
      action.style.display="block";
      action.onclick=actionCallback;
    } else {
      action.style.display="none";
      action.onclick=null;
    }
  }
}
function hidePopup(){
  const box=document.getElementById("popupBox");
  const action=document.getElementById("popupActionBtn");
  if(box) box.style.display="none";
  if(action){
    action.style.display="none";
    action.onclick=null;
  }
  if(onPopupClose){
    const fn=onPopupClose;
    onPopupClose=null;
    fn();
  }
}
window.addEventListener("load",()=>{
  const close=document.getElementById("popupClose");
  if(close) close.onclick=hidePopup;
});


function P(x,y,z){return {x:x-2,y:y-1.5,z:z-0.5};}
function key(c){return `${c.x},${c.y},${c.z}`;}

const fillCells=[
  {x:0,y:0,z:0},{x:1,y:0,z:0},{x:2,y:0,z:0},{x:3,y:0,z:0},
  {x:0,y:1,z:0},{x:0,y:2,z:0}
];
const occupied=new Map();

function showCalculationIntroPopup(){
  if(calcPopupShown) return;
  calcPopupShown=true;

  setTimeout(()=>{
    showPopup(
      "Sehr gut! Der Körper ist mit 6 cm³-Würfeln gefüllt. Er hat somit ein Volumen von 6 cm³. Jetzt lernen wir, wie wir das Volumen solcher „schräger“ Körper auch rechnerisch bestimmen können!",
      "#111",
      "Los",
      ()=>{
        hidePopup();
        calcOptionsUnlocked=true;
        btn.style.display="none";
        btn2.style.display="inline-block";
        btn3.style.display="inline-block";
        draw();
      }
    );
  },2000);
}

function updateVolumeCounter(){
  const counter=document.getElementById("volumeCounter");
  if(!counter) return;
  const n=occupied.size;

  if(!cubesVisible){
    counter.textContent="";
    return;
  }

  if(n===0){
    counter.textContent="Bisher eingefüllt: 0 cm³";
  } else if(n<6){
    counter.textContent="Bisher eingefüllt: " + n + " cm³";
  } else {
    counter.textContent="Geschafft! Volumen = 6 cm³";
  }
}

const outerFaces=[
  {pts:[[0,0,1],[4,0,1],[4,1,1],[1,1,1],[1,3,1],[0,3,1]], color:"rgba(143,179,199,.50)"},
  {pts:[[0,0,0],[0,3,0],[1,3,0],[1,1,0],[4,1,0],[4,0,0]], color:"rgba(127,153,183,.35)"},
  {pts:[[0,0,0],[4,0,0],[4,0,1],[0,0,1]], color:"rgba(143,179,199,.50)"},
  {pts:[[4,0,0],[4,1,0],[4,1,1],[4,0,1]], color:"rgba(127,153,183,.50)"},
  {pts:[[4,1,0],[1,1,0],[1,1,1],[4,1,1]], color:"rgba(168,201,234,.50)"},
  {pts:[[1,1,0],[1,3,0],[1,3,1],[1,1,1]], color:"rgba(127,153,183,.45)"},
  {pts:[[1,3,0],[0,3,0],[0,3,1],[1,3,1]], color:"rgba(168,201,234,.50)"},
  {pts:[[0,3,0],[0,0,0],[0,0,1],[0,3,1]], color:"rgba(143,179,199,.50)"}
].map(f=>({pts:f.pts.map(p=>P(...p)), color:f.color}));

const outerEdges=[
 [[0,0,1],[4,0,1]],[[4,0,1],[4,1,1]],[[4,1,1],[1,1,1]],[[1,1,1],[1,3,1]],[[1,3,1],[0,3,1]],[[0,3,1],[0,0,1]],
 [[0,0,0],[4,0,0]],[[4,0,0],[4,1,0]],[[4,1,0],[1,1,0]],[[1,1,0],[1,3,0]],[[1,3,0],[0,3,0]],[[0,3,0],[0,0,0]],
 [[0,0,0],[0,0,2]],[[4,0,0],[4,0,1]],[[4,1,0],[4,1,1]],[[1,1,0],[1,1,1]],[[1,3,0],[1,3,1]],[[0,3,0],[0,3,1]]
].map(e=>e.map(p=>P(...p)));


const task2Faces=[
  {pts:[[0,0,2],[3,0,2],[3,1,2],[2,1,2],[2,2,2],[0,2,2]], color:"rgba(143,179,199,.50)"},
  {pts:[[0,0,0],[0,2,0],[2,2,0],[2,1,0],[3,1,0],[3,0,0]], color:"rgba(127,153,183,.35)"},
  {pts:[[0,0,0],[3,0,0],[3,0,2],[0,0,2]], color:"rgba(143,179,199,.50)"},
  {pts:[[3,0,0],[3,1,0],[3,1,2],[3,0,2]], color:"rgba(127,153,183,.50)"},
  {pts:[[3,1,0],[2,1,0],[2,1,2],[3,1,2]], color:"rgba(168,201,234,.50)"},
  {pts:[[2,1,0],[2,2,0],[2,2,2],[2,1,2]], color:"rgba(127,153,183,.45)"},
  {pts:[[2,2,0],[0,2,0],[0,2,2],[2,2,2]], color:"rgba(168,201,234,.50)"},
  {pts:[[0,2,0],[0,0,0],[0,0,2],[0,2,2]], color:"rgba(143,179,199,.50)"}
].map(f=>({pts:f.pts.map(p=>P(...p)), color:f.color}));

const task2Edges=[
 [[0,0,2],[3,0,2]],[[3,0,2],[3,1,2]],[[3,1,2],[2,1,2]],[[2,1,2],[2,2,2]],[[2,2,2],[0,2,2]],[[0,2,2],[0,0,2]],
 [[0,0,0],[3,0,0]],[[3,0,0],[3,1,0]],[[3,1,0],[2,1,0]],[[2,1,0],[2,2,0]],[[2,2,0],[0,2,0]],[[0,2,0],[0,0,0]],
 [[0,0,0],[0,0,2]],[[3,0,0],[3,0,2]],[[3,1,0],[3,1,2]],[[2,1,0],[2,1,2]],[[2,2,0],[2,2,2]],[[0,2,0],[0,2,2]]
].map(e=>e.map(p=>P(...p)));

function activeOuterFaces(){
  return currentTask===2 ? task2Faces : outerFaces;
}
function activeOuterEdges(){
  return currentTask===2 ? task2Edges : outerEdges;
}


function rot(p){
 let x=p.x,y=p.y,z=p.z;
 const cy=Math.cos(ry),sy=Math.sin(ry);
 const x1=x*cy-z*sy,z1=x*sy+z*cy;
 const cx=Math.cos(rx),sx=Math.sin(rx);
 const y1=y*cx-z1*sx,z2=y*sx+z1*cx;
 return{x:x1,y:y1,z:z2};
}
function project(p){
 const r=rot(p);
 return{x:canvas.width/2+r.x*scale,y:canvas.height/2-r.y*scale,z:r.z};
}
function avgZ(pts){return pts.map(p=>rot(p).z).reduce((a,b)=>a+b,0)/pts.length;}
function normalZ(pts){
 const a=rot(pts[0]),b=rot(pts[1]),c=rot(pts[2]);
 const ux=b.x-a.x,uy=b.y-a.y,uz=b.z-a.z;
 const vx=c.x-a.x,vy=c.y-a.y,vz=c.z-a.z;
 return ux*vy-uy*vx;
}
function poly(pts,fill,stroke,lw){
 const p=pts.map(project);
 ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);
 for(let i=1;i<p.length;i++)ctx.lineTo(p[i].x,p[i].y);
 ctx.closePath();ctx.fillStyle=fill;ctx.fill();
 ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.lineJoin="round";ctx.stroke();
}
function drawEdge(a,b){
 const pa=project(a),pb=project(b);
 const z=(pa.z+pb.z)/2;
 if(z<0) return;

 // innere L-Kante und herausragende Artefakte ausblenden
 const dx=Math.abs(pb.x-pa.x);
 const dy=Math.abs(pb.y-pa.y);
 const len=Math.hypot(pb.x-pa.x,pb.y-pa.y);

 if(len<25) return;
 if(dx<3 && dy>220) return;

 ctx.beginPath();
 ctx.moveTo(pa.x,pa.y);
 ctx.lineTo(pb.x,pb.y);
 ctx.strokeStyle="#000";
 ctx.lineWidth=3.1;
 ctx.stroke();
}

function facePoints(x,y,z,side){
 const v={A:P(x,y,z),B:P(x+1,y,z),C:P(x+1,y+1,z),D:P(x,y+1,z),
          E:P(x,y,z+1),F:P(x+1,y,z+1),G:P(x+1,y+1,z+1),H:P(x,y+1,z+1)};
 if(side==="front")return[v.E,v.F,v.G,v.H];
 if(side==="back")return[v.A,v.D,v.C,v.B];
 if(side==="left")return[v.A,v.E,v.H,v.D];
 if(side==="right")return[v.B,v.C,v.G,v.F];
 if(side==="top")return[v.D,v.H,v.G,v.C];
 if(side==="bottom")return[v.A,v.B,v.F,v.E];
}
function neighbour(x,y,z,s){
 if(s==="front")return[x,y,z+1]; if(s==="back")return[x,y,z-1];
 if(s==="left")return[x-1,y,z]; if(s==="right")return[x+1,y,z];
 if(s==="top")return[x,y+1,z]; return[x,y-1,z];
}
function hasGreen(x,y,z){return occupied.has(`${x},${y},${z}`);}

function greenFaceItems(){
 const items=[], sides=["front","back","left","right","top","bottom"];
 for(const c of fillCells){
   if(!hasGreen(c.x,c.y,c.z))continue;
   for(const s of sides){
     const [nx,ny,nz]=neighbour(c.x,c.y,c.z,s);
     if(!hasGreen(nx,ny,nz)){
       const pts=facePoints(c.x,c.y,c.z,s);
       if(normalZ(pts)>0){
         items.push({pts,z:avgZ(pts),color:s==="top"?"#4ade80":(s==="right"||s==="back"?"#16a34a":"#22c55e")});
       }
     }
   }
 }
 return items;
}


function drawSplitOverlay(){
  if(!splitMode) return;

  const t = (performance.now() - splitAnimStart) / 1000;
  let move = 0;
  const cycle = 4.2;
  const p = t % cycle;

  if(p < 0.7){
    move = 0; // kurz komplett angedockt
  } else if(p < 1.8){
    const a = (p - 0.7) / 1.1;
    move = (1 - Math.cos(a * Math.PI)) / 2 * 0.55; // herausfahren
  } else if(p < 2.4){
    move = 0.55; // kurz getrennt
  } else if(p < 3.5){
    const a = (p - 2.4) / 1.1;
    move = (1 + Math.cos(a * Math.PI)) / 2 * 0.55; // zurückfahren
  } else {
    move = 0; // wieder kurz angedockt
  }

  const splitItems = [];

  function addCuboid(x0,y0,z0,w,h,d,color){
    const pts = {
      A:P(x0,y0,z0), B:P(x0+w,y0,z0), C:P(x0+w,y0+h,z0), D:P(x0,y0+h,z0),
      E:P(x0,y0,z0+d), F:P(x0+w,y0,z0+d), G:P(x0+w,y0+h,z0+d), H:P(x0,y0+h,z0+d)
    };
    const faces = [
      {pts:[pts.E,pts.F,pts.G,pts.H], c:color},
      {pts:[pts.A,pts.D,pts.C,pts.B], c:color},
      {pts:[pts.A,pts.B,pts.F,pts.E], c:color},
      {pts:[pts.B,pts.C,pts.G,pts.F], c:color},
      {pts:[pts.D,pts.H,pts.G,pts.C], c:color},
      {pts:[pts.A,pts.E,pts.H,pts.D], c:color}
    ];
    for(const f of faces){
      if(normalZ(f.pts)>0) splitItems.push({pts:f.pts,z:avgZ(f.pts),c:f.c});
    }
  }

  // Zwei Quader werden nur leicht voneinander getrennt und wieder zusammengefügt.
  // Unterer blauer Quader bleibt EIN zusammenhängender Quader.
  // So entsteht keine innere blaue Trennfläche.
  addCuboid(0,0,0,4,1,1,"rgba(37,99,235,.45)");

  // Roter Quader wird komplett vom oberen Teil abgehoben.
  addCuboid(0,1+move,0,1,2,1,"rgba(220,38,38,.58)");

  splitItems.sort((a,b)=>a.z-b.z);
  for(const it of splitItems){
    poly(it.pts,it.c,"#000",3);
  }

  // Maße am blauen unteren Quader
  ctx.font="32px Arial";
  drawMovingText("4 cm", P(2,-.35,1.08));
  // Beide 1-cm-Angaben rechts an den passenden Kanten:
  drawMovingText("1 cm", P(4.16,0.55,1.08)); // Höhe an der rechten Vorderkante
  drawMovingText("1 cm", P(4.28,0.18,0.5));  // Tiefe an der rechten Seitenkante

  // Bewegte Maße am roten Quader
  drawMovingText("2 cm", P(1.12, 2.05 + move, 1.08));     // Höhe
  drawMovingText("1 cm", P(0.45, 3.18 + move, 1.08));     // Länge
  drawMovingText("1 cm", P(1.08, 3.02 + move, 0.48));     // Tiefe oben

  ctx.font="32px Arial";
  ctx.fillStyle="#2563eb";
  let ps=project(P(2,-0.9,1.2));
  
  const x0 = ps.x - 310;
  const y0 = ps.y;
  ctx.fillStyle="#111";
  ctx.fillText("Gesamtvolumen: ", x0, y0);
  ctx.fillStyle="#2563eb";
  ctx.fillText("4 cm³", x0 + 255, y0);
  ctx.fillStyle="#111";
  ctx.fillText(" + ", x0 + 350, y0);
  ctx.fillStyle="#dc2626";
  ctx.fillText("2 cm³", x0 + 400, y0);
  ctx.fillStyle="#111";
  ctx.fillText(" = ", x0 + 495, y0);
  ctx.fillText("6 cm³", x0 + 540, y0);
}


function drawCompleteOverlay(){
  if(!completeMode) return;

  const t = (performance.now() - completeAnimStart) / 1000;
  
  let move = 0;
  if(t > 1){
    const tt = t - 1;
    // startet bei 0, fährt heraus und kommt immer wieder exakt auf 0 zurück
    move = (1 - Math.cos(tt * 1.7)) / 2 * 0.50;
  }

  const items = [];

  function addCuboid(x0,y0,z0,w,h,d,color,edge="#000"){
    const pts = {
      A:P(x0,y0,z0), B:P(x0+w,y0,z0), C:P(x0+w,y0+h,z0), D:P(x0,y0+h,z0),
      E:P(x0,y0,z0+d), F:P(x0+w,y0,z0+d), G:P(x0+w,y0+h,z0+d), H:P(x0,y0+h,z0+d)
    };
    const faces = [
      {pts:[pts.E,pts.F,pts.G,pts.H], c:color, edge},
      {pts:[pts.A,pts.D,pts.C,pts.B], c:color, edge},
      {pts:[pts.A,pts.B,pts.F,pts.E], c:color, edge},
      {pts:[pts.B,pts.C,pts.G,pts.F], c:color, edge},
      {pts:[pts.D,pts.H,pts.G,pts.C], c:color, edge},
      {pts:[pts.A,pts.E,pts.H,pts.D], c:color, edge}
    ];
    for(const f of faces){
      if(normalZ(f.pts)>0) items.push({pts:f.pts,z:avgZ(f.pts),c:f.c,edge:f.edge});
    }
  }

  // Ursprünglicher blauer Körper als EIN zusammenhängendes L ohne innere Trennlinie.
  for(const f of outerFaces){
    items.push({
      pts:f.pts,
      z:avgZ(f.pts),
      c:f.color,
      edge:"#000"
    });
  }

  // Fehlender ergänzter Quader erscheint erst nach Klick auf „Jetzt ergänzen!“
  if(showComplementBlock){
    addCuboid(1+move,1+move,0,3,2,1,"rgba(234,88,12,.58)");
  }

  items.sort((a,b)=>a.z-b.z);
  for(const it of items){
    poly(it.pts,it.c,it.edge,3);
  }

  // Maße am blauen Körper in der Ergänzen-Ansicht
  ctx.font="32px Arial";
  drawMovingText("4 cm", P(2,-.35,1.08), "#111");      // Länge unten
  drawMovingText("3 cm", P(-.68,1.35,1.08), "#111");   // Höhe links

  // Bewegte Maße am orangefarbenen Ergänzungsquader
  if(showComplementBlock){
    ctx.font="32px Arial";
    // Orangefarbener Ergänzungsquader:
    // 3 cm an die vordere lange Kante
    drawMovingText("3 cm", P(2.55 + move, 1.02 + move, 1.08), "#ea580c");
    // 2 cm bleibt an der rechten Höhenkante
    drawMovingText("2 cm", P(4.18 + move, 1.95 + move, 0.5), "#ea580c");
    // 1 cm an die obere rechte Tiefenkante
    drawMovingText("1 cm", P(4.08 + move, 3.05 + move, 0.55), "#ea580c");
  }

  ctx.font="32px Arial";
  const ps=project(P(2,-0.9,1.2));
  const x0=ps.x-310, y0=ps.y;
  ctx.fillStyle="#111";
  ctx.fillText("Gesamtvolumen: ",x0,y0);
  ctx.fillText("12 cm³",x0+255,y0);
  ctx.fillText(" − ",x0+370,y0);
  ctx.fillStyle="#ea580c";
  ctx.fillText("6 cm³",x0+425,y0);
  ctx.fillStyle="#111";
  ctx.fillText(" = 6 cm³",x0+525,y0);
}

function drawScene(){
 const items=[];
 for(const f of activeOuterFaces())items.push({type:"blue",pts:f.pts,z:avgZ(f.pts),front:normalZ(f.pts)>0,color:f.color});
 for(const g of greenFaceItems())items.push({type:"green",...g});
 items.sort((a,b)=>a.z-b.z);
 for(const it of items){
   if(it.type==="blue") poly(it.pts,it.color,it.front?"#000":"rgba(80,80,80,.25)",it.front?2.4:1.1);
   else poly(it.pts,it.color,"#000",2.6);
 }
 for(const e of activeOuterEdges())drawEdge(e[0],e[1]);
}

function drawMovingText(t,pos,color="#111"){
 const p=project(pos);
 ctx.fillStyle=color;
 ctx.fillText(t,p.x,p.y);
}

function drawLabels(){
 ctx.fillStyle="#111";ctx.font="32px Arial";
 const labels = currentTask===2
   ? [
      ["3 cm",P(1.5,-.35,2.08)],

      ["2 cm",P(1.0,2.25,2.08)],
      ["2 cm",P(3.15,.22,1.5)],
      ["1 cm",P(2.45,1.25,2.08)],
      ["1 cm",P(2.08,1.55,2.08)]
     ]
   : [
      ["4 cm",P(2,-.35,1.08)],
      ["3 cm",P(-.68,1.35,1.08)],
      ["3 cm",P(2.45,1.22,1.08)],
      ["2 cm",P(1.1,2.05,1.08)],
      ["1 cm",P(4.16,.22,.5)],
      ["1 cm",P(-0.05,3.25,1.08)]
     ];
 for(const [t,pos] of labels){const p=project(pos);ctx.fillText(t,p.x,p.y);}
}

const cubes=[];
function makeLooseCubes(){
 cubes.length=0;
 const n=10,gap=64,total=(n-1)*gap+54,start=Math.max(20,(canvas.width-total)/2);
 for(let i=0;i<n;i++)cubes.push({id:i,x:start+i*gap,y:canvas.height-72,snap:null,hidden:false});
}
function poly2(pts,fill,stroke,lw){
 ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
 for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
 ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.lineJoin="round";ctx.stroke();
}
function drawLooseCube(c){
 const s=44,d=16,x=c.x,y=c.y;
 poly2([{x,y},{x:x+s,y},{x:x+s,y:y+s},{x,y:y+s}],"#22c55e","#000",2.2);
 poly2([{x,y},{x:x+d,y:y-d},{x:x+s+d,y:y-d},{x:x+s,y}],"#4ade80","#000",2.2);
 poly2([{x:x+s,y},{x:x+s+d,y:y-d},{x:x+s+d,y:y+s-d},{x:x+s,y:y+s}],"#16a34a","#000",2.2);
 ctx.fillStyle="#111";ctx.font="16px Arial";ctx.fillText("1 cm³",x+4,y+s+20);
}
function cellCenter(c){return project(P(c.x+.5,c.y+.5,c.z+.5));}
function hitLooseCube(mx,my){
 for(let i=cubes.length-1;i>=0;i--){
   const c=cubes[i];
   if(c.snap!==null) continue;

   // Große Trefferfläche um den GANZEN Würfel:
   // Vorderfläche, Deckfläche, Seitenfläche und Beschriftung werden gemeinsam greifbar.
   if(mx>=c.x-20 && mx<=c.x+90 && my>=c.y-42 && my<=c.y+92){
     return c;
   }
 }
 return null;
}


function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
}

function drawTask2SplitOverlay(){
  if(!task2SplitMode) return;

  const t=(performance.now()-task2AnimStart)/1000;
  const cycle=4.2;
  const p=t%cycle;
  let move=0;
  if(p<0.7){ move=0; }
  else if(p<1.8){ const a=(p-0.7)/1.1; move=(1-Math.cos(a*Math.PI))/2*0.55; }
  else if(p<2.4){ move=0.55; }
  else if(p<3.5){ const a=(p-2.4)/1.1; move=(1+Math.cos(a*Math.PI))/2*0.55; }
  else { move=0; }

  const items=[];
  function addCuboid(x0,y0,z0,w,h,d,color){
    const pts={
      A:P(x0,y0,z0), B:P(x0+w,y0,z0), C:P(x0+w,y0+h,z0), D:P(x0,y0+h,z0),
      E:P(x0,y0,z0+d), F:P(x0+w,y0,z0+d), G:P(x0+w,y0+h,z0+d), H:P(x0,y0+h,z0+d)
    };
    const faces=[
      {pts:[pts.E,pts.F,pts.G,pts.H],c:color},
      {pts:[pts.A,pts.D,pts.C,pts.B],c:color},
      {pts:[pts.A,pts.B,pts.F,pts.E],c:color},
      {pts:[pts.B,pts.C,pts.G,pts.F],c:color},
      {pts:[pts.D,pts.H,pts.G,pts.C],c:color},
      {pts:[pts.A,pts.E,pts.H,pts.D],c:color}
    ];
    for(const f of faces){
      if(normalZ(f.pts)>0) items.push({pts:f.pts,z:avgZ(f.pts),c:f.c});
    }
  }

  // Neuer Körper: blauer Grundquader + roter Aufsatz, Tiefe jeweils 2 cm.
  addCuboid(0,0,0,3,1,2,"rgba(37,99,235,.45)");
  addCuboid(0,1+move,0,2,1,2,"rgba(220,38,38,.58)");

  items.sort((a,b)=>a.z-b.z);
  for(const it of items) poly(it.pts,it.c,"#000",3);

  ctx.font="32px Arial";
  // Maße am blauen Grundquader
  drawMovingText("3 cm", P(1.5,-.35,2.08), "#111");
  drawMovingText("1 cm", P(3.15,.55,2.08), "#111");
  drawMovingText("2 cm", P(3.25,.20,1.0), "#111");

  // Bewegte Maße am roten Quader
  drawMovingText("2 cm", P(1.0,2.22+move,2.08), "#dc2626");
  drawMovingText("1 cm", P(-.68,1.45+move,2.08), "#dc2626");
  drawMovingText("2 cm", P(2.05,1.95+move,1.0), "#dc2626");
}

function drawTask2CompleteOverlay(){
  if(!task2CompleteMode) return;

  const t=(performance.now()-task2AnimStart)/1000;
  let move=0;
  if(t>1){
    const tt=t-1;
    move=(1-Math.cos(tt*1.7))/2*0.50;
  }

  const items=[];
  function addCuboid(x0,y0,z0,w,h,d,color){
    const pts={
      A:P(x0,y0,z0), B:P(x0+w,y0,z0), C:P(x0+w,y0+h,z0), D:P(x0,y0+h,z0),
      E:P(x0,y0,z0+d), F:P(x0+w,y0,z0+d), G:P(x0+w,y0+h,z0+d), H:P(x0,y0+h,z0+d)
    };
    const faces=[
      {pts:[pts.E,pts.F,pts.G,pts.H],c:color},
      {pts:[pts.A,pts.D,pts.C,pts.B],c:color},
      {pts:[pts.A,pts.B,pts.F,pts.E],c:color},
      {pts:[pts.B,pts.C,pts.G,pts.F],c:color},
      {pts:[pts.D,pts.H,pts.G,pts.C],c:color},
      {pts:[pts.A,pts.E,pts.H,pts.D],c:color}
    ];
    for(const f of faces){
      if(normalZ(f.pts)>0) items.push({pts:f.pts,z:avgZ(f.pts),c:f.c});
    }
  }

  // Originalkörper bleibt blau ohne innere Unterteilung
  for(const f of task2Faces){
    items.push({pts:f.pts,z:avgZ(f.pts),c:f.color});
  }

  // Ergänzungsblock: fehlender Bereich rechts oben, Tiefe 2 cm
  addCuboid(2+move,1+move,0,1,1,2,"rgba(234,88,12,.58)");

  items.sort((a,b)=>a.z-b.z);
  for(const it of items) poly(it.pts,it.c,"#000",3);

  ctx.font="32px Arial";
  // Maße am blauen Körper
  drawMovingText("3 cm", P(1.5,-.35,2.08), "#111");
  drawMovingText("2 cm", P(-.68,1.0,2.08), "#111");
  drawMovingText("2 cm", P(3.15,.22,1.5), "#111");
  drawMovingText("1 cm", P(2.45,1.25,2.08), "#111");
  drawMovingText("1 cm", P(2.08,1.55,2.08), "#111");

  // Bewegte Maße am orangefarbenen Ergänzungsquader
  drawMovingText("1 cm", P(2.5+move,1.22+move,2.08), "#ea580c");
  drawMovingText("1 cm", P(3.12+move,1.55+move,2.08), "#ea580c");
  drawMovingText("2 cm", P(3.18+move,1.22+move,1.0), "#ea580c");
}



function clearTaskQuestionPanel(){

function showTaskQuestion(mode, stage){
  taskQuestionMode=mode;
  taskQuestionStage=stage;

  const panel=document.getElementById("taskQuestionPanel");
  if(!panel) return;

  panel.style.display="block";

  let color = mode==="split" ? "#111" : "#ea580c";
  let borderColor = color;
  let question = "";
  let correct = 0;

  if(mode==="split"){
    if(stage===1){
      question = "1. Welches Volumen hat der rote Quader?";
      correct = 4;
    } else if(stage===2){
      question = "2. Welches Volumen hat der blaue Quader?";
      correct = 6;
    } else if(stage===3){
      question = "3. Wie groß ist das Gesamtvolumen?";
      correct = 10;
    }
  }

  if(mode==="complete"){
    if(stage===1){
      question = "1. Welches Volumen hat der große ergänzte Quader?";
      correct = 12;
    } else if(stage===2){
      question = "2. Welches Volumen hat der orange ergänzte Quader?";
      correct = 2;
    } else if(stage===3){
      question = "3. Was bleibt nach dem Abziehen übrig?";
      correct = 10;
    }
  }

  panel.style.borderColor=borderColor;

  panel.innerHTML = `
    <div style="color:${color}; margin-bottom:12px; line-height:1.25;">${question}</div>
    <div>
      <input id="answerInput" type="number" inputmode="numeric" style="
        width:120px;
        font-size:24px;
        padding:8px 12px;
        border:3px solid ${color};
        border-radius:12px;
        text-align:center;
      "> 
      <span style="font-size:24px;">cm³</span>
    </div>
    <button id="answerCheck" style="
      margin-top:12px;
      font-size:20px;
      padding:10px 22px;
      border-radius:12px;
      background:${color};
      color:white;
      border:0;
      cursor:pointer;
    ">Prüfen</button>
    <div id="answerFeedback" style="height:30px;margin-top:8px;font-size:20px;"></div>
  `;

  const input=document.getElementById("answerInput");
  if(input) input.focus();

  document.getElementById("answerCheck").onclick=()=>{
    const val=Number(document.getElementById("answerInput").value);
    const fb=document.getElementById("answerFeedback");

    if(val===correct){
      fb.style.color="#16a34a";
      fb.textContent="Richtig!";

      setTimeout(()=>{
        if(stage<3){
          showTaskQuestion(mode,stage+1);
        } else {
          panel.style.borderColor="#16a34a";
          panel.innerHTML = mode==="split"
            ? `<div style="color:#111;font-size:28px;font-weight:700;line-height:1.35;">Geschafft!<br>4 cm³ + 6 cm³ = 10 cm³</div>`
            : `<div style="color:#111;font-size:28px;font-weight:700;line-height:1.35;">Geschafft!<br>12 cm³ − 2 cm³ = 10 cm³</div>`;
        }
      },700);
    } else {
      fb.style.color="#dc2626";
      fb.textContent="Noch nicht. Tipp: Länge · Breite · Höhe.";
    }
  };
}

function draw(){
 const rect=canvas.getBoundingClientRect();
 canvas.width=Math.floor(rect.width);
 canvas.height=Math.floor(rect.height);
 ctx.clearRect(0,0,canvas.width,canvas.height);
 if(currentTask===2 && task2SplitMode){
   drawTask2SplitOverlay();
 } else if(currentTask===2 && task2CompleteMode){
   drawTask2CompleteOverlay();
 } else if(splitMode){
   drawSplitOverlay();
 } else if(completeMode){
   drawCompleteOverlay();
 } else {
   drawScene();
 }
 if(!splitMode && !completeMode && !task2SplitMode && !task2CompleteMode){
   drawLabels();
 }
 if(cubesVisible){
   for(const c of cubes){
     if(c.snap===null && !c.hidden) drawLooseCube(c);
   }
 }
 updateVolumeCounter();
 drawSplitButton();
 drawCompleteButton();
}


function startAnimation(){
  if(animationRunning) return;
  animationRunning=true;
  function loop(){
    if(!animationRunning) return;
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}
function stopAnimation(){
  animationRunning=false;
}

canvas.addEventListener("pointerdown",e=>{
 e.preventDefault();
 activePointerId=e.pointerId;
 try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
 const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
 lastX=mx;lastY=my;

 if(hitSplitButton(mx,my)){
   startSplitAnimationNow();
   return;
 }

 if(hitCompleteButton(mx,my)){
   startCompleteAnimationNow();
   return;
 }

 const h=cubesVisible?hitLooseCube(mx,my):null;
 if(h){draggingCube=h;canvas.classList.add("dragCube");}
 else draggingModel=true;
});
canvas.addEventListener("pointermove",e=>{
 if(activePointerId!==null && e.pointerId!==activePointerId) return;
 e.preventDefault();
 if(!draggingCube && !draggingModel) return;

 const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
 if(draggingCube){
   draggingCube.x+=mx-lastX;
   draggingCube.y+=my-lastY;
   lastX=mx;lastY=my;
   draw();
   return;
 }
 if(draggingModel){
   ry-=(mx-lastX)*.01;
   rx+=(my-lastY)*.01;
   lastX=mx;lastY=my;
   draw();
 }
});
function finishPointer(e){
 if(e && activePointerId!==null && e.pointerId!==activePointerId) return;

 if(draggingCube){
   let best=null,bd=99999,cx=draggingCube.x+22,cy=draggingCube.y+22;
   for(const cell of fillCells){
     if(occupied.has(key(cell)))continue;
     const p=cellCenter(cell),d=Math.hypot(cx-p.x,cy-p.y);
     if(d<bd){bd=d;best=cell;}
   }
   if(best&&bd<105){
     occupied.set(key(best),draggingCube.id);
     draggingCube.snap=best;
     if(occupied.size >= 6){
       for(const c of cubes){
         if(c.snap === null) c.hidden = true;
       }
       showCalculationIntroPopup();
     }
     updateVolumeCounter();
   }
 }
 draggingCube=null;
 draggingModel=false;
 activePointerId=null;
 canvas.classList.remove("dragCube");
 draw();
}
canvas.addEventListener("pointerup",finishPointer);
canvas.addEventListener("pointercancel",finishPointer);
canvas.addEventListener("wheel",e=>{e.preventDefault();scale*=e.deltaY>0?.92:1.08;scale=Math.max(60,Math.min(210,scale));draw();},{passive:false});
window.addEventListener("resize",()=>{
  if(innerWidth<700 && currentTask===1){ scale=95; }
  if(cubesVisible)makeLooseCubes();
  draw();
});
if(innerWidth<700){ scale=95; rx=0.28; ry=0.62; }
draw();
document.addEventListener("touchmove", function(e){
  if(e.target===canvas) e.preventDefault();
}, {passive:false});
